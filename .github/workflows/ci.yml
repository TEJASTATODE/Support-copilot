name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Backend checks ───────────────────────────────────────────────────────────
  backend:
    name: Backend — lint + syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          cd backend
          ruff check app/ --select E,F,W --ignore E501
        # E501 = line too long — we ignore it; everything else is enforced
        # E = pycodestyle errors
        # F = pyflakes (undefined names, unused imports)
        # W = pycodestyle warnings

      - name: Syntax check all Python files
        run: |
          cd backend
          python -m py_compile app/*.py
          echo "All Python files compile OK"

      - name: Check imports resolve
        run: |
          cd backend
          python -c "
          import sys
          sys.path.insert(0, '.')
          from app.config import Settings
          from app.chunking import chunk_text
          from app.embeddings import embed_query
          print('All imports OK')
          "

  # ── Frontend checks ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend — install + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build
        # if the build fails, the PR is blocked
        # this catches import errors, missing components, Tailwind issues

  # ── Docker build check ───────────────────────────────────────────────────────
  docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # only build images after lint + frontend build pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: false   # build only, don't push to registry
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile.worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max